{% extends 'base.html' %}

{% block content %}
<h2>Produkter</h2>
<table>
    <thead>
        <tr>
            <th>Produkt</th>
            <th>Stregkode</th>
            <th>Lager</th>
        </tr>
    </thead>
    <tbody>
        {% for product in products %}
        <tr>
            <td>{{ product.name }}</td>
            <td>{{ product.barcode }}</td>
            <td>{{ product.stock }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
